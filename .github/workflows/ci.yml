name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lsof

      - name: Build
        run: make clean && make

      - name: Unit tests
        run: make test-unit

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y lsof

      - name: Build
        run: make clean && make

      - name: Integration tests
        run: make test-integration
